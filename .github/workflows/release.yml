name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v2.0.0)"
        required: true
        default: "v2.0.0"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret-Zen 2.0.0"
      changelog:
        description: "Release changelog"
        required: false
        default: ""

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Nuitka x64
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuitka-win-x64
          path: dist_nuitka/main.dist/**
          if-no-files-found: error

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust fallback
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build Nuitka arm64
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuitka-win-arm64
          path: dist_nuitka/main.dist/**
          if-no-files-found: error

  package-release:
    needs:
      - build-windows-x64
      - build-windows-arm64
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\dist_installer -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.nuitka_staging -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\.artifacts -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\installer_payload -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download x64 artifact
        uses: actions/download-artifact@v5
        with:
          name: nuitka-win-x64
          path: .artifacts/win_x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v5
        with:
          name: nuitka-win-arm64
          path: .artifacts/win_arm64

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag) {
            $tag = "v2.0.0"
          }
          $version = $tag.TrimStart("v")
          $name = "${{ inputs.release_name }}"
          if (-not $name) {
            $name = "Zapret-Zen $version"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Prepare release payloads
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          python .\scripts\prepare_nuitka_release.py `
            --x64-source .\.artifacts\win_x64 `
            --arm64-source .\.artifacts\win_arm64 `
            --payload-dir .\installer_payload `
            --release-dir ".\release_$version" `
            --version $version

      - name: Build universal installer
        shell: pwsh
        run: .\scripts\build_nuitka_installer.ps1 -Python python -PayloadDir installer_payload -OutputDir dist_installer -SkipPrepareRelease

      - name: Place installer into release folder
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          Copy-Item ".\dist_installer\install_zapretzen_${version}_universal.exe" ".\release_$version\" -Force

      - name: SignPath placeholder
        shell: pwsh
        run: .\scripts\signpath_stub.ps1 -InputPath ".\.artifacts\win_x64\zapret_zen.exe"

      - name: Read release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $notesPath = ".\.github\release-notes\$version.md"
          if (Test-Path $notesPath) {
            $body = Get-Content $notesPath -Raw -Encoding UTF8
          } else {
            $body = "${{ inputs.changelog }}"
          }
          "body<<__zapret_zen_NOTES__" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "__zapret_zen_NOTES__" >> $env:GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            release_${{ steps.release_meta.outputs.version }}/install_zapretzen_${{ steps.release_meta.outputs.version }}_universal.exe
            release_${{ steps.release_meta.outputs.version }}/*portable*.zip
